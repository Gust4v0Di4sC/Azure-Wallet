{% extends "base.html" %}

{% block title %}{{ title }} - Lumen{% endblock %}

{% block content %}
<main class="min-h-screen px-5 py-8">
    <section class="mx-auto max-w-3xl">
        <a href="/" class="text-sm font-semibold text-[#9ed8ff]">Back to dashboard</a>
        <h1 class="mt-5 text-3xl font-extrabold text-[#dce8ee]">{{ title }}</h1>

        <form method="POST" action="{{ action }}" class="mt-8 grid gap-5 rounded-[28px] border border-[#102a35] bg-[#061014] p-6 md:grid-cols-2">
            {% match general_error %}
            {% when Some with (message) %}
                <div class="md:col-span-2 rounded-3xl border border-[#9b0f0f] px-5 py-4 text-sm text-[#ff8b8b]">{{ message }}</div>
            {% when None %}
            {% endmatch %}

            <label class="block md:col-span-2">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Name</span>
                <input name="name" value="{{ form.name }}" required class="w-full rounded-full border {% if name_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none focus:border-[#1f5678]">
                {% match name_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <label class="block">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Ticker</span>
                <input name="ticker" value="{{ form.ticker }}" required class="w-full rounded-full border {% if ticker_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none focus:border-[#1f5678]">
                {% match ticker_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <label class="block">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Class</span>
                <input name="asset_class" value="{{ form.asset_class }}" required placeholder="stock, fund, crypto" class="w-full rounded-full border {% if asset_class_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none placeholder:text-[#765c5d] focus:border-[#1f5678]">
                {% match asset_class_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <label class="block">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Quantity</span>
                <input type="number" step="0.00000001" name="quantity" value="{{ form.quantity }}" required class="w-full rounded-full border {% if quantity_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none focus:border-[#1f5678]">
                {% match quantity_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <label class="block">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Currency</span>
                <input name="currency" value="{{ form.currency }}" required placeholder="USD" class="w-full rounded-full border {% if currency_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none placeholder:text-[#765c5d] focus:border-[#1f5678]">
                {% match currency_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <label class="block">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Average price</span>
                <input type="number" step="0.01" name="average_price" value="{{ form.average_price }}" required class="w-full rounded-full border {% if average_price_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none focus:border-[#1f5678]">
                {% match average_price_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <label class="block">
                <span class="mb-3 block text-xs font-semibold uppercase tracking-[0.32em] text-[#aaa39d]">Current price</span>
                <input type="number" step="0.01" name="current_price" value="{{ form.current_price }}" required class="w-full rounded-full border {% if current_price_error.is_some() %}border-[#9b0f0f]{% else %}border-[#102a35]{% endif %} bg-transparent px-5 py-4 text-[#dce8ee] outline-none focus:border-[#1f5678]">
                {% match current_price_error %}{% when Some with (message) %}<span class="mt-2 block text-sm text-[#ff8b8b]">{{ message }}</span>{% when None %}{% endmatch %}
            </label>

            <button type="submit" class="md:col-span-2 rounded-full bg-[#1f5678] px-6 py-4 text-lg font-bold text-white hover:bg-[#27698f]">{{ button }}</button>
        </form>
    </section>
</main>
{% endblock %}
